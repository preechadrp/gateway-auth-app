server:
  port: 8080

jwt:
  secret: my-super-secret-key-my-super-secret-key

spring:

  application:
    name: gateway-auth-app

  threads:
    virtual:
      enabled: true

  cloud:
    gateway:
      server:
        webmvc:

          routes:

            - id: sign-service
              uri: http://localhost:9001
              predicates:
                - Path=/api/sign/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
        
my-app:
  secure-api:
    #keystore-path: classpath:keystore.jks
    #keystore-pass: ENCRYPTED_KEYSTORE_PASS_HERE
    #truststore-path: classpath:truststore.jks
    #truststore-pass: ENCRYPTED_TRUSTSTORE_PASS_HERE
    #proxy-host: proxy.yourcompany.com
    #proxy-port: 8080
    proxy-user: proxyuser
    proxy-password: proxypassword